name: Go CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  lint:
    name: Lint Codebase
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          install-mode: goinstall
          args: --timeout=5m

  build-and-test:
    name: Build & Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Install dependencies
      run: go mod download

    - name: Build
      run: go build -v ./cmd/bbpts

    - name: Run Unit Tests
      run: go test -v -short ./...

  integration-tests:
    name: Tool Integration Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Build BBPTS
      run: go build -o bbpts ./cmd/bbpts

    - name: Run Mock BBPTS Pipeline
      # Test basic functionality without external tools
      run: |
        mkdir -p results
        echo "example.com" > test-targets.txt
        ./bbpts -input test-targets.txt -tools "" -summary results/summary.csv -timeout 1s
      continue-on-error: true # Allow graceful failure if tools aren't available

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: results/
