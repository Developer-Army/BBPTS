name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Cross-compile and release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Build release binaries
        run: |
          VERSION=${GITHUB_REF_NAME}
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          LDFLAGS="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}"

          mkdir -p dist

          GOOS=linux   GOARCH=amd64  go build -ldflags="${LDFLAGS}" -o dist/bbpts-linux-amd64     ./cmd/bbpts
          GOOS=linux   GOARCH=arm64  go build -ldflags="${LDFLAGS}" -o dist/bbpts-linux-arm64     ./cmd/bbpts
          GOOS=darwin  GOARCH=amd64  go build -ldflags="${LDFLAGS}" -o dist/bbpts-darwin-amd64    ./cmd/bbpts
          GOOS=darwin  GOARCH=arm64  go build -ldflags="${LDFLAGS}" -o dist/bbpts-darwin-arm64    ./cmd/bbpts
          GOOS=windows GOARCH=amd64  go build -ldflags="${LDFLAGS}" -o dist/bbpts-windows-amd64.exe ./cmd/bbpts

          cd dist && sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
