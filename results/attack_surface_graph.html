<!DOCTYPE html>
<html>
<head>
    <title>BBPTS Attack Surface Graph</title>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style type="text/css">
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #0f172a; color: white; font-family: sans-serif; }
        #mynetwork { width: 100%; height: 100%; border: none; }
        .header { position: absolute; top: 20px; left: 20px; z-index: 100; pointer-events: none; }
        h1 { margin: 0; font-size: 24px; color: #38bdf8; }
        p { margin: 5px 0 0 0; color: #94a3b8; }
    </style>
</head>
<body>
<div class="header">
    <h1>Attack Surface Graph</h1>
    <p>Interactive visualization of discovered assets</p>
</div>
<div id="mynetwork"></div>
<script type="text/javascript">
    var nodes = new vis.DataSet([{"id":"https://0aa700e2036a91bb80dcf8fd006000e3.web-security-academy.net","label":"https://0aa700e2036a91bb80dcf8fd006000e3.web-security-academy.net","group":"url"},{"id":"web-security-academy.net","label":"web-security-academy.net","group":"domain"},{"id":"0aa700e2036a91bb80dcf8fd006000e3.web-security-academy.net","label":"0aa700e2036a91bb80dcf8fd006000e3.web-security-academy.net","group":"subdomain"}]);
    var edges = new vis.DataSet([{"from":"web-security-academy.net","to":"0aa700e2036a91bb80dcf8fd006000e3.web-security-academy.net"},{"from":"0aa700e2036a91bb80dcf8fd006000e3.web-security-academy.net","to":"https://0aa700e2036a91bb80dcf8fd006000e3.web-security-academy.net"}]);

    var container = document.getElementById('mynetwork');
    var data = { nodes: nodes, edges: edges };
    var options = {
        nodes: {
            shape: 'dot',
            size: 16,
            font: { color: '#e2e8f0', size: 14 }
        },
        edges: {
            color: '#475569',
            smooth: { type: 'continuous' }
        },
        groups: {
            domain: { color: { background: '#ef4444', border: '#b91c1c' }, size: 24 },
            subdomain: { color: { background: '#f59e0b', border: '#b45309' }, size: 20 },
            url: { color: { background: '#10b981', border: '#047857' }, size: 12 },
            asset: { color: { background: '#6366f1', border: '#4338ca' }, size: 16 }
        },
        physics: {
            forceAtlas2Based: { gravitationalConstant: -50, centralGravity: 0.01, springLength: 100, springConstant: 0.08 },
            maxVelocity: 50,
            solver: 'forceAtlas2Based',
            timestep: 0.35,
            stabilization: { iterations: 150 }
        }
    };
    var network = new vis.Network(container, data, options);
</script>
</body>
</html>
